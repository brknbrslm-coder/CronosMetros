<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CronosMetros - Giriş Yap veya Hesap Oluştur">
    <title>CronosMetros — Giriş</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-container { width: 100%; max-width: 420px; }
        .login-card {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 40px 32px;
            box-shadow: var(--shadow-lg);
        }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand .brand-icon { width: 64px; height: 64px; margin: 0 auto 16px; }
        .login-brand h1 {
            font-size: 1.8rem; font-weight: 800;
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
        }
        .login-brand p { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
        .login-tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg-card); border-radius: var(--radius-sm); padding: 4px; }
        .login-tab {
            flex: 1; padding: 10px; border: none; border-radius: var(--radius-sm);
            background: transparent; color: var(--text-muted); font-family: inherit;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all var(--transition);
        }
        .login-tab.active { background: var(--accent-primary); color: white; }
        .login-form { display: flex; flex-direction: column; gap: 16px; }
        .login-form .form-group { margin-bottom: 0; }
        .login-btn {
            width: 100%; padding: 14px; border: none; border-radius: var(--radius-md);
            background: var(--accent-gradient); color: white; font-family: inherit;
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: all var(--transition);
            margin-top: 8px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(108,99,255,0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .login-error {
            padding: 10px 16px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius-sm); color: var(--danger); font-size: 0.85rem;
            display: none; text-align: center;
        }
        .login-error.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="url(#lg)" stroke-width="2.5"/>
                        <line x1="20" y1="8" x2="20" y2="20" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="20" y1="20" x2="28" y2="26" stroke="url(#lg)" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="20" cy="20" r="2.5" fill="url(#lg)"/>
                        <defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#6C63FF"/><stop offset="100%" stop-color="#00D2FF"/></linearGradient></defs>
                    </svg>
                </div>
                <h1>CronosMetros</h1>
                <p>Sınav hazırlığını akıllıca takip et</p>
            </div>

            <div class="login-tabs">
                <button class="login-tab active" id="tab-login">Giriş Yap</button>
                <button class="login-tab" id="tab-register">Hesap Oluştur</button>
                <button class="login-tab" id="tab-forgot">Şifremi Unuttum</button>
            </div>

            <div class="login-error" id="login-error"></div>
            <div id="login-success" style="display:none;padding:10px 16px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;color:#10b981;font-size:0.85rem;text-align:center;"></div>

            <!-- Giriş / Kayıt Formu -->
            <form class="login-form" id="auth-form">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input type="text" id="username" placeholder="örn: burak_2026" required minlength="3" maxlength="30" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" placeholder="En az 6 karakter" required minlength="6" autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="auth-btn">Giriş Yap</button>
            </form>

            <!-- Şifremi Unuttum: Adım 1 (kullanıcı adı) -->
            <form class="login-form" id="forgot-step1" style="display:none">
                <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:4px">Kullanıcı adını gir, güvenlik sorusunu getirelim.</p>
                <div class="form-group">
                    <label for="forgot-username">Kullanıcı Adı</label>
                    <input type="text" id="forgot-username" placeholder="Kullanıcı adın" required>
                </div>
                <button type="submit" class="login-btn">Devam Et</button>
            </form>

            <!-- Şifremi Unuttum: Adım 2 (soru + yeni şifre) -->
            <form class="login-form" id="forgot-step2" style="display:none">
                <div class="form-group">
                    <label>Güvenlik Sorusu</label>
                    <div id="forgot-question-text" style="padding:10px;background:var(--bg-input);border-radius:8px;font-size:0.9rem;color:var(--text-secondary)"></div>
                </div>
                <div class="form-group">
                    <label for="forgot-answer">Cevabınız</label>
                    <input type="text" id="forgot-answer" placeholder="Cevabınız" required>
                </div>
                <div class="form-group">
                    <label for="forgot-new-pass">Yeni Şifre</label>
                    <input type="password" id="forgot-new-pass" placeholder="En az 6 karakter" required minlength="6">
                </div>
                <button type="submit" class="login-btn">Şifreyi Sıfırla</button>
                <button type="button" class="login-btn" id="forgot-back" style="background:var(--bg-card);color:var(--text-muted);margin-top:4px">← Geri</button>
            </form>
        </div>
    </div>

    <script>
        let currentTab = 'login';
        let forgotUsername = '';

        if (localStorage.getItem('cronos_token')) window.location.href = '/';

        const tabLoginBtn = document.getElementById('tab-login');
        const tabRegisterBtn = document.getElementById('tab-register');
        const tabForgotBtn = document.getElementById('tab-forgot');
        const authForm = document.getElementById('auth-form');
        const forgotStep1 = document.getElementById('forgot-step1');
        const forgotStep2 = document.getElementById('forgot-step2');

        tabLoginBtn.addEventListener('click', () => switchTab('login'));
        tabRegisterBtn.addEventListener('click', () => switchTab('register'));
        tabForgotBtn.addEventListener('click', () => switchTab('forgot'));
        authForm.addEventListener('submit', handleAuth);
        forgotStep1.addEventListener('submit', handleForgotStep1);
        forgotStep2.addEventListener('submit', handleForgotStep2);
        document.getElementById('forgot-back').addEventListener('click', () => {
            forgotStep2.style.display = 'none';
            forgotStep1.style.display = 'flex';
        });

        function showMsg(msg, type) {
            const errEl = document.getElementById('login-error');
            const sucEl = document.getElementById('login-success');
            if (type === 'success') {
                errEl.style.display = 'none';
                sucEl.textContent = msg; sucEl.style.display = 'block';
                setTimeout(() => sucEl.style.display = 'none', 5000);
            } else {
                sucEl.style.display = 'none';
                errEl.textContent = msg; errEl.classList.add('visible'); errEl.style.display = 'block';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            tabLoginBtn.classList.toggle('active', tab === 'login');
            tabRegisterBtn.classList.toggle('active', tab === 'register');
            tabForgotBtn.classList.toggle('active', tab === 'forgot');

            authForm.style.display = (tab === 'login' || tab === 'register') ? 'flex' : 'none';
            forgotStep1.style.display = tab === 'forgot' ? 'flex' : 'none';
            forgotStep2.style.display = 'none';

            document.getElementById('login-error').style.display = 'none';
            document.getElementById('login-success').style.display = 'none';

            if (tab !== 'forgot') {
                document.getElementById('auth-btn').textContent = tab === 'login' ? 'Giriş Yap' : 'Hesap Oluştur';
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('auth-btn');
            btn.disabled = true;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            try {
                const endpoint = currentTab === 'login' ? '/api/auth/login' : '/api/auth/register';
                const res = await fetch(endpoint, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) { showMsg(data.error || 'Bir hata oluştu.', 'error'); btn.disabled = false; return; }
                localStorage.setItem('cronos_token', data.token);
                localStorage.setItem('cronos_user', JSON.stringify(data.user));
                window.location.href = '/';
            } catch (err) {
                showMsg('Sunucuya bağlanılamadı.', 'error'); btn.disabled = false;
            }
        }

        async function handleForgotStep1(e) {
            e.preventDefault();
            forgotUsername = document.getElementById('forgot-username').value.trim();
            try {
                const res = await fetch('/api/auth/security-question?username=' + encodeURIComponent(forgotUsername));
                const data = await res.json();
                if (!res.ok) { showMsg(data.error || 'Kullanıcı bulunamadı.', 'error'); return; }
                document.getElementById('forgot-question-text').textContent = data.question;
                forgotStep1.style.display = 'none';
                forgotStep2.style.display = 'flex';
                document.getElementById('login-error').style.display = 'none';
            } catch (err) { showMsg('Sunucu hatası.', 'error'); }
        }

        async function handleForgotStep2(e) {
            e.preventDefault();
            const answer = document.getElementById('forgot-answer').value.trim();
            const newPass = document.getElementById('forgot-new-pass').value;
            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: forgotUsername, security_answer: answer, new_password: newPass })
                });
                const data = await res.json();
                if (!res.ok) { showMsg(data.error || 'Hata oluştu.', 'error'); return; }
                showMsg('Şifren başarıyla sıfırlandı! Şimdi giriş yapabilirsin.', 'success');
                switchTab('login');
                forgotStep2.reset();
            } catch (err) { showMsg('Sunucu hatası.', 'error'); }
        }
    </script>
</body>
</html>
